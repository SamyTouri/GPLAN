<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPLANTS - Recherche Plantes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7f5; color: #1a1a1a; min-height: 100vh; }

    .header { background: #2d5a27; color: white; padding: 20px 40px; display: flex; align-items: center; gap: 16px; }
    .header h1 { font-size: 24px; font-weight: 600; }
    .header span { font-size: 14px; opacity: 0.8; }

    .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

    .search-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
    .search-card h2 { font-size: 18px; margin-bottom: 20px; color: #2d5a27; }

    .search-form { display: grid; grid-template-columns: 2fr 1.5fr 1fr auto; gap: 16px; align-items: end; }
    @media (max-width: 768px) { .search-form { grid-template-columns: 1fr; } }

    .field { position: relative; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
    .field input { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; transition: border-color 0.2s; }
    .field input:focus { outline: none; border-color: #2d5a27; }
    .field input::placeholder { color: #aaa; }

    /* Autocomplete dropdown */
    .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1.5px solid #2d5a27; border-top: none; border-radius: 0 0 8px 8px; max-height: 300px; overflow-y: auto; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.12); display: none; }
    .autocomplete-list.active { display: block; }
    .autocomplete-item { padding: 10px 14px; font-size: 14px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
    .autocomplete-item:hover, .autocomplete-item.selected { background: #e8f5e3; }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item .highlight { font-weight: 700; color: #2d5a27; }
    .autocomplete-count { padding: 8px 14px; font-size: 11px; color: #999; background: #fafafa; border-bottom: 1px solid #eee; }
    .field input.has-autocomplete { border-radius: 8px 8px 0 0; border-color: #2d5a27; }

    .btn-search { padding: 10px 28px; background: #2d5a27; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; height: 42px; }
    .btn-search:hover { background: #1e3d1a; }
    .btn-search:disabled { background: #999; cursor: not-allowed; }

    .results-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .results-header h2 { font-size: 18px; color: #2d5a27; }
    .results-header .count { font-size: 14px; color: #888; }

    .results-table { width: 100%; border-collapse: collapse; }
    .results-table th { text-align: left; padding: 10px 12px; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #eee; }
    .results-table td { padding: 12px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
    .results-table tr:hover td { background: #f8faf8; }

    .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-excellent { background: #dcfce7; color: #166534; }
    .badge-bon { background: #fef9c3; color: #854d0e; }
    .badge-partiel { background: #fee2e2; color: #991b1b; }

    .price { font-weight: 600; color: #2d5a27; }
    .botanical { font-style: italic; color: #888; font-size: 12px; }

    .loading { text-align: center; padding: 40px; color: #888; }
    .loading .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #ddd; border-top-color: #2d5a27; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { text-align: center; padding: 40px; color: #aaa; }
    .empty p { font-size: 15px; }

    .error { background: #fee2e2; color: #991b1b; padding: 12px 16px; border-radius: 8px; font-size: 14px; }

    .info-bar { display: flex; gap: 20px; font-size: 12px; color: #888; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>GPLANTS</h1>
    <span>Recherche de disponibilites fournisseurs</span>
  </div>

  <div class="container">
    <div class="search-card">
      <h2>Rechercher une plante</h2>
      <div class="search-form">
        <div class="field" id="plant-field">
          <label>Nom de la plante</label>
          <input type="text" id="plant_name" placeholder="Commencez a taper..." autocomplete="off" autofocus>
          <div class="autocomplete-list" id="autocomplete"></div>
        </div>
        <div class="field">
          <label>Taille / Format (optionnel)</label>
          <input type="text" id="size" placeholder="Ex: 150-175cm, C10, haute-tige...">
        </div>
        <div class="field">
          <label>Quantite min.</label>
          <input type="number" id="quantity" placeholder="Ex: 50" min="1">
        </div>
        <button class="btn-search" id="btn-search" onclick="search()">Rechercher</button>
      </div>
    </div>

    <div id="results" class="results-card" style="display:none;">
      <div class="results-header">
        <h2>Resultats</h2>
        <span class="count" id="results-count"></span>
      </div>
      <div id="results-body"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://ia.codevo.be/webhook/gplants-search';
    const SUPABASE_URL = 'https://tntpjpahucgndcnyvple.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRudHBqcGFodWNnbmRjbnl2cGxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzA4MjIsImV4cCI6MjA5MDYwNjgyMn0.9HegOqdZ2mhty774EBE0W0vBLVNzVNaRbPBNOcsRWZE';

    // ==================== AUTOCOMPLETE ====================
    const plantInput = document.getElementById('plant_name');
    const autocompleteList = document.getElementById('autocomplete');
    let acTimeout = null;
    let acSelected = -1;
    let acItems = [];

    plantInput.addEventListener('input', () => {
      clearTimeout(acTimeout);
      selectedPlant = null; // Reset selection when user types
      plantInput.style.borderColor = '#ddd';
      const q = plantInput.value.trim();
      if (q.length < 2) { closeAutocomplete(); return; }
      acTimeout = setTimeout(() => fetchAutocomplete(q), 200);
    });

    plantInput.addEventListener('keydown', (e) => {
      if (!autocompleteList.classList.contains('active')) {
        if (e.key === 'Enter') search();
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        acSelected = Math.min(acSelected + 1, acItems.length - 1);
        highlightItem();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        acSelected = Math.max(acSelected - 1, 0);
        highlightItem();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (acSelected >= 0 && acItems[acSelected]) {
          selectItem(acItems[acSelected]);
        } else {
          closeAutocomplete();
          search();
        }
      } else if (e.key === 'Escape') {
        closeAutocomplete();
      }
    });

    document.addEventListener('click', (e) => {
      if (!document.getElementById('plant-field').contains(e.target)) closeAutocomplete();
    });

    async function fetchAutocomplete(query) {
      try {
        const normalized = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        const url = `${SUPABASE_URL}/rest/v1/plant_names?name_normalized=ilike.*${encodeURIComponent(normalized)}*&select=name&limit=20&order=name`;
        const res = await fetch(url, { headers: { 'apikey': SUPABASE_ANON } });
        const data = await res.json();

        acItems = data.map(d => d.name);
        acSelected = -1;

        if (acItems.length === 0) { closeAutocomplete(); return; }

        let html = `<div class="autocomplete-count">${acItems.length} resultat(s)</div>`;
        acItems.forEach((name, i) => {
          const highlighted = highlightMatch(name, query);
          html += `<div class="autocomplete-item" data-index="${i}" onmousedown="selectItem('${esc(name).replace(/'/g, "\\'")}')">${highlighted}</div>`;
        });

        autocompleteList.innerHTML = html;
        autocompleteList.classList.add('active');
        plantInput.classList.add('has-autocomplete');
      } catch (e) {
        closeAutocomplete();
      }
    }

    function highlightMatch(text, query) {
      const idx = text.toLowerCase().indexOf(query.toLowerCase());
      if (idx === -1) return esc(text);
      return esc(text.substring(0, idx)) +
        '<span class="highlight">' + esc(text.substring(idx, idx + query.length)) + '</span>' +
        esc(text.substring(idx + query.length));
    }

    function highlightItem() {
      autocompleteList.querySelectorAll('.autocomplete-item').forEach((el, i) => {
        el.classList.toggle('selected', i === acSelected);
        if (i === acSelected) el.scrollIntoView({ block: 'nearest' });
      });
    }

    function selectItem(name) {
      plantInput.value = name;
      selectedPlant = name;
      plantInput.style.borderColor = '#2d5a27';
      closeAutocomplete();
      document.getElementById('size').focus();
    }

    function closeAutocomplete() {
      autocompleteList.classList.remove('active');
      autocompleteList.innerHTML = '';
      plantInput.classList.remove('has-autocomplete');
      acSelected = -1;
      acItems = [];
    }

    // ==================== SEARCH ====================
    document.getElementById('size').addEventListener('keypress', e => { if (e.key === 'Enter') search(); });
    document.getElementById('quantity').addEventListener('keypress', e => { if (e.key === 'Enter') search(); });

    let selectedPlant = null; // Only set when user picks from autocomplete

    async function search() {
      const plantName = document.getElementById('plant_name').value.trim();
      if (!plantName) { document.getElementById('plant_name').focus(); return; }
      if (!selectedPlant || selectedPlant !== plantName) {
        plantInput.style.borderColor = '#dc2626';
        plantInput.setAttribute('placeholder', 'Selectionnez un nom dans la liste');
        plantInput.focus();
        return;
      }

      const size = document.getElementById('size').value.trim();
      const quantity = document.getElementById('quantity').value;

      const btn = document.getElementById('btn-search');
      const resultsDiv = document.getElementById('results');
      const resultsBody = document.getElementById('results-body');
      const resultsCount = document.getElementById('results-count');

      btn.disabled = true;
      btn.textContent = 'Recherche...';
      resultsDiv.style.display = 'block';
      resultsBody.innerHTML = '<div class="loading"><span class="spinner"></span> Recherche en cours (analyse IA des tailles)...</div>';

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            plant_name: plantName,
            size: size || null,
            quantity: quantity ? parseInt(quantity) : null
          })
        });

        const data = await response.json();

        if (!data.results || data.results.length === 0) {
          resultsCount.textContent = '';
          resultsBody.innerHTML = '<div class="empty"><p>Aucun resultat pour cette recherche.</p></div>';
          if (data.raw_matches) {
            resultsBody.innerHTML += '<div class="info-bar">' + data.raw_matches + ' plantes trouvees dans la base, mais aucune ne correspond aux criteres de taille/quantite.</div>';
          }
        } else {
          resultsCount.textContent = data.results.length + ' resultat(s)' + (data.raw_matches ? ' / ' + data.raw_matches + ' dans la base' : '');

          let html = '<table class="results-table"><thead><tr>';
          html += '<th>Fournisseur</th><th>Plante</th><th>Taille</th><th>Prix</th><th>Disponible</th><th>Pertinence</th>';
          html += '</tr></thead><tbody>';

          for (const r of data.results) {
            const badgeClass = r.match_score === 'excellent' ? 'badge-excellent' : r.match_score === 'bon' ? 'badge-bon' : 'badge-partiel';
            html += '<tr>';
            html += '<td><strong>' + esc(r.supplier_name) + '</strong></td>';
            html += '<td>' + esc(r.plant_name) + (r.botanical_name ? '<br><span class="botanical">' + esc(r.botanical_name) + '</span>' : '') + '</td>';
            html += '<td>' + esc(r.size || '-') + '</td>';
            html += '<td class="price">' + (r.price !== null ? r.price.toFixed(2) + ' ' + (r.currency || 'EUR') : '-') + '</td>';
            html += '<td>' + (r.availability !== null ? r.availability + ' pcs' : '-') + '</td>';
            html += '<td><span class="badge ' + badgeClass + '">' + esc(r.match_score || 'partiel') + '</span></td>';
            html += '</tr>';
          }

          html += '</tbody></table>';
          resultsBody.innerHTML = html;
        }
      } catch (err) {
        resultsBody.innerHTML = '<div class="error">Erreur: ' + esc(err.message) + '</div>';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Rechercher';
      }
    }

    function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  </script>
</body>
</html>
